name: Upload Python Package to TEST PYPI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel build twine

      - name: Get current version from pyproject.toml
        id: get_version
        run: echo "::set-output name=version::$(grep -oP '(?<=version = ")[^"]*' pyproject.toml)"

      - name: Increment version with random patch
        id: increment_version
        run: |
          major_minor=$(echo "${{ steps.get_version.outputs.version }}" | awk -F. '{print $1"."$2}')
          random_patch=$(python -c "import random; print(random.randint(10000,99999))")
          echo "::set-output name=version::${major_minor}.${random_patch}"

      - name: Update version in pyproject.toml
        run: sed -i "s/version = \".*\"/version = \"${{ steps.increment_version.outputs.version }}\"/" pyproject.toml

      - name: Build and upload to Test PyPI (master branch)
        # if: github.ref == 'refs/heads/master'
        run: |
          python -m build
          twine upload --repository-url https://test.pypi.org/legacy/ --username __token__ --password ${{ secrets.TEST_PYPI_TOKEN }} dist/*
